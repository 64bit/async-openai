name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  format:
    name: Check Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          override: true

      - name: Check formatting
        run: cargo fmt --all -- --check

  build-features:
    name: Build Feature - ${{ matrix.feature }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          [
            byot,
            responses,
            webhook,
            audio,
            video,
            image,
            embedding,
            evals,
            finetuning,
            grader,
            batch,
            file,
            upload,
            model,
            moderation,
            vectorstore,
            chatkit,
            container,
            skill,
            realtime,
            chat-completion,
            assistant,
            administration,
            completions,
            response-types,
            webhook-types,
            audio-types,
            video-types,
            image-types,
            embedding-types,
            eval-types,
            finetuning-types,
            grader-types,
            batch-types,
            file-types,
            upload-types,
            model-types,
            moderation-types,
            vectorstore-types,
            chatkit-types,
            container-types,
            skill-types,
            realtime-types,
            chat-completion-types,
            assistant-types,
            administration-types,
            completion-types,
            types,
            full,
          ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.feature }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-

      - name: Build with feature ${{ matrix.feature }}
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build --no-default-features --features ${{ matrix.feature }} --verbose

      - name: Run clippy with feature ${{ matrix.feature }}
        run: cargo clippy --no-default-features --features ${{ matrix.feature }} -- -D warnings

      - name: Build with feature ${{ matrix.feature }} and middleware
        if: ${{ !contains(matrix.feature, 'types') }}
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build --no-default-features --features ${{ matrix.feature }},middleware --verbose

  tls-features:
    name: TLS Feature - ${{ matrix.feature }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: [rustls, rustls-no-provider, native-tls, native-tls-vendored]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build with TLS feature ${{ matrix.feature }}
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build -p async-openai --no-default-features --features ${{ matrix.feature }},chat-completion --verbose

      # -e normal,build matches what `cargo build` actually compiles.
      # `--prefix none` keeps the
      # output as one crate per line so the grep below can anchor on the
      # crate name precisely.
      - name: Verify aws-lc-rs is absent under ${{ matrix.feature }}
        if: matrix.feature != 'rustls'
        run: |
          tree=$(cargo tree -p async-openai --no-default-features \
            --features ${{ matrix.feature }},chat-completion \
            -e normal,build --prefix none)
          if echo "$tree" | grep -qE '^aws-lc-rs( |$)'; then
            echo "ERROR: aws-lc-rs was pulled in by ${{ matrix.feature }}:"
            echo "$tree" | grep -E '^aws-lc'
            exit 1
          fi
          echo "OK: no aws-lc-rs in dependency tree"

      - name: Verify aws-lc-rs is present under rustls (sanity check)
        if: matrix.feature == 'rustls'
        run: |
          tree=$(cargo tree -p async-openai --no-default-features \
            --features rustls,chat-completion \
            -e normal,build --prefix none)
          if ! echo "$tree" | grep -qE '^aws-lc-rs( |$)'; then
            echo "ERROR: expected aws-lc-rs to be pulled in by rustls feature, but it was not"
            exit 1
          fi
          echo "OK: aws-lc-rs present in dependency tree"
